kind = "web"
previewPath = "/"
title = "StagePro"
version = "1.0.0"
id = "artifacts/stagepro"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24669

[services.development]
run = "pnpm --filter @workspace/stagepro run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/stagepro", "run", "build" ]
publicDir = "artifacts/stagepro/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24669"
BASE_PATH = "/"
